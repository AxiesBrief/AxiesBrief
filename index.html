    const CATEGORY_KEYWORDS = {
        defence: ["defence","defense","military","army","navy","air force","missile","drone","weapon","submarine","border","conflict","war","combat","arsenal","tank"],
        geopolitics: ["diplomacy","summit","nato","eu","brics","quad","foreign policy","sanctions","alliance","united nations","bilateral","treaty","china","russia","ukraine","gaza","israel","iran","geopolitical","ambassador"],
        economy: ["economy","gdp","inflation","market","trade","recession","stock","budget","growth","fiscal","deficit","finance","tax","revenue","currency"],
        technology: ["ai","chip","semiconductor","space","satellite","quantum","5g","cyber","startup","tech","innovation","isro","nasa","spacex","digital"],
        conflict: ["war","attack","strike","casualties","ceasefire","invasion","bombing","missile strike","terror","militant","violence","offensive"],
        health: ["health","pandemic","vaccine","disease","covid","hospital","medicine","healthcare","outbreak","virus"]
    };

    function classifyArticle(title, summary) {
        const text = (title + " " + (summary || "")).toLowerCase();
        const matched = new Set();
        for (const [cat, keywords] of Object.entries(CATEGORY_KEYWORDS))
            if (keywords.some(kw => text.includes(kw))) matched.add(cat);
        if (matched.size === 0) matched.add("geopolitics");
        return Array.from(matched);
    }

    function calculateImpact(title, summary, tags) {
        const text = (title + " " + summary).toLowerCase();
        let score = 3;
        if (text.includes("war") || text.includes("attack") || text.includes("crisis") || text.includes("missile")) score += 3;
        if (text.includes("casualty") || text.includes("killed") || text.includes("strike") || text.includes("dead")) score += 2;
        if (text.includes("summit") || text.includes("deal") || text.includes("breakthrough")) score += 1;
        if (tags.includes("conflict") || tags.includes("defence")) score += 1;
        return Math.min(10, Math.max(1, score));
    }

    function getSentiment(title, summary) {
        const text = (title + " " + summary).toLowerCase();
        const posWords = ["growth","record","boost","success","agreement","deal","positive","win","breakthrough","launch","surge","alliance"];
        const negWords = ["crisis","crash","attack","kill","death","war","conflict","collapse","threat","sanction","downgrade","violence","strike","casualty","hostile"];
        let pos = posWords.filter(w => text.includes(w)).length;
        let neg = negWords.filter(w => text.includes(w)).length;
        if (pos > neg) return "positive";
        if (neg > pos) return "negative";
        return "neutral";
    }

    function getRegionLabel(r) {
        const map = { africa:"🌍 Africa", americas:"🌎 Americas", europe:"🇪🇺 Europe", middleeast:"🕌 Middle East", asia:"🌏 Asia", other:"🌐 Global" };
        return map[r] || "🌐 World";
    }

    const PROXIES = [
        url => `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
        url => `https://corsproxy.io/?${encodeURIComponent(url)}`,
        url => `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(url)}`
    ];

    async function fetchSource(source) {
        for (const proxyBuilder of PROXIES) {
            try {
                const proxyUrl = proxyBuilder(source.url);
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 8000);
                const resp = await fetch(proxyUrl, { signal: controller.signal });
                clearTimeout(timeoutId);
                if (!resp.ok) continue;
                let raw = await resp.text();
                if (proxyUrl.includes("rss2json.com") && raw.includes('"items"')) {
                    const json = JSON.parse(raw);
                    if (json.items && json.items.length) {
                        const items = json.items.map(item => ({ title: item.title, link: item.link, description: item.description, pubDate: item.pubDate ? new Date(item.pubDate) : new Date() }));
                        return itemsToArticles(items, source.region);
                    }
                    continue;
                }
                const parser = new DOMParser();
                const doc = parser.parseFromString(raw, "text/xml");
                if (doc.querySelector("parsererror")) continue;
                let rssItems = doc.querySelectorAll("item");
                if (!rssItems.length) rssItems = doc.querySelectorAll("entry");
                if (!rssItems.length) continue;
                const items = [];
                for (let i = 0; i < Math.min(rssItems.length, 10); i++) {
                    const get = (sel) => rssItems[i].querySelector(sel)?.textContent?.trim() || "";
                    const title = get("title");
                    if (!title) continue;
                    const link = get("link");
                    const desc = (get("description") || get("summary") || "").replace(/<[^>]*>/g, "").slice(0, 450);
                    const pubRaw = get("pubDate") || get("published");
                    const pubDate = pubRaw ? new Date(pubRaw) : new Date();
                    items.push({ title, link: link || "#", description: desc, pubDate });
                }
                return itemsToArticles(items, source.region);
            } catch(e) { continue; }
        }
        return [];
    }

    function itemsToArticles(items, regionCode) {
        return items.filter(it => it.title && it.title.length > 5).map(it => {
            const tags = classifyArticle(it.title, it.description);
            return {
                id: btoa(it.title.slice(0, 45) + regionCode).replace(/[^a-zA-Z0-9]/g, "").slice(0, 22),
                title: it.title,
                link: it.link,
                summary: it.description || "Read full briefing",
                tags: tags,
                impact: calculateImpact(it.title, it.description, tags),
                sentiment: getSentiment(it.title, it.description),
                region: regionCode,
                regionLabel: getRegionLabel(regionCode),
                pubDate: it.pubDate instanceof Date ? it.pubDate : new Date()
            };
        });
    }

    async function refreshAll() {
        const grid = document.getElementById("newsGrid");
        grid.innerHTML = `<div class="loader"><div class="spinner"></div><span>Pulling from 140+ sources...</span></div>`;
        const results = await Promise.allSettled(SOURCES.map(src => fetchSource(src)));
        let combined = [];
        for (const res of results) if (res.status === "fulfilled") combined.push(...res.value);
        const seen = new Set();
        const unique = combined.filter(art => { const key = art.title.toLowerCase().trim(); if (seen.has(key)) return false; seen.add(key); return true; });
        allArticles = unique.sort((a,b) => b.pubDate - a.pubDate);
        document.getElementById("totalCount").innerText = allArticles.length;
        document.getElementById("savedStat").innerText = savedArticles.length;
        renderFeed(); renderSavedPage();
    }

    function filterAndSort() {
        let filtered = [...allArticles];
        if (activeRegion !== "all") filtered = filtered.filter(a => a.region === activeRegion);
        if (activeCategory !== "all") filtered = filtered.filter(a => a.tags.includes(activeCategory));
        const searchTerm = document.getElementById("searchInput")?.value.toLowerCase() || "";
        if (searchTerm) filtered = filtered.filter(a => a.title.toLowerCase().includes(searchTerm) || a.summary.toLowerCase().includes(searchTerm));
        if (activeSort === "impact") filtered.sort((a,b) => b.impact - a.impact);
        else if (activeSort === "positive") filtered.sort((a,b) => (b.sentiment === "positive" ? 1 : 0) - (a.sentiment === "positive" ? 1 : 0));
        else if (activeSort === "negative") filtered.sort((a,b) => (b.sentiment === "negative" ? 1 : 0) - (a.sentiment === "negative" ? 1 : 0));
        else filtered.sort((a,b) => b.pubDate - a.pubDate);
        return filtered;
    }

    function isSaved(art) { return savedArticles.some(s => s.id === art.id); }
    function toggleSave(article) {
        if (isSaved(article)) savedArticles = savedArticles.filter(s => s.id !== article.id);
        else savedArticles.push(article);
        localStorage.setItem("axiesbrief_saved", JSON.stringify(savedArticles));
        document.getElementById("savedStat").innerText = savedArticles.length;
        renderFeed(); renderSavedPage();
        showToast(isSaved(article) ? "Removed from saved" : "Article saved ✓");
    }

    function renderFeed() {
        const filtered = filterAndSort();
        const container = document.getElementById("newsGrid");
        if (!filtered.length) { container.innerHTML = `<div class="empty-state">📭 No briefings match filters.</div>`; return; }
        container.innerHTML = filtered.map(art => `
            <div class="news-card">
                <div class="card-header">
                    <div class="tag-group">
                        ${art.tags.slice(0,2).map(t => `<span class="tag">${t}</span>`).join("")}
                        <span class="region-badge">${art.regionLabel}</span>
                    </div>
                    <div class="impact-badge impact-${art.impact >= 8 ? 'critical' : art.impact >= 6 ? 'high' : art.impact >= 4 ? 'medium' : 'low'}">⚡ ${art.impact}/10</div>
                </div>
                <div><span class="sentiment sent-${art.sentiment}">${art.sentiment}</span></div>
                <div class="article-title"><a href="${art.link}" target="_blank" rel="noopener">${escapeHtml(art.title)}</a></div>
                <div class="summary">${escapeHtml(art.summary.substring(0, 120))}${art.summary.length > 120 ? '...' : ''}</div>
                <div class="card-footer">
                    <div><span>📅 ${formatDate(art.pubDate)}</span> <a href="${art.link}" target="_blank" class="readmore-link">Read more →</a></div>
                    <button class="save-btn ${isSaved(art) ? 'active' : ''}" data-id="${art.id}">${isSaved(art) ? '★ Saved' : '☆ Save'}</button>
                </div>
            </div>
        `).join("");
        document.querySelectorAll(".save-btn").forEach(btn => {
            const id = btn.getAttribute("data-id");
            const article = filtered.find(a => a.id === id);
            if (article) btn.onclick = (e) => { e.stopPropagation(); toggleSave(article); };
        });
    }

    function renderSavedPage() {
        const container = document.getElementById("savedGrid");
        if (!savedArticles.length) { container.innerHTML = `<div class="empty-state">🔖 No saved articles. Click ☆ on any briefing.</div>`; return; }
        container.innerHTML = savedArticles.map(art => `
            <div class="news-card">
                <div class="tag-group">${art.tags.slice(0,2).map(t => `<span class="tag">${t}</span>`).join("")}<span class="region-badge">${art.regionLabel}</span></div>
                <div class="article-title"><a href="${art.link}" target="_blank">${escapeHtml(art.title)}</a></div>
                <div class="summary">${escapeHtml(art.summary.substring(0,100))}...</div>
                <div class="card-footer">
                    <div><span>⚡ Impact ${art.impact}/10</span> <a href="${art.link}" target="_blank" class="readmore-link">Read more →</a></div>
                    <button class="save-btn active" data-id="${art.id}">★ Remove</button>
                </div>
            </div>
        `).join("");
        container.querySelectorAll(".save-btn").forEach(btn => {
            const id = btn.getAttribute("data-id");
            const article = savedArticles.find(a => a.id === id);
            if (article) btn.onclick = () => toggleSave(article);
        });
    }

    function formatDate(d) { if (!d || isNaN(d.getTime())) return "recent"; return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', hour:'2-digit', minute:'2-digit' }); }
    function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])); }
    function showToast(msg) { const t = document.getElementById("toastMsg"); t.innerText = msg; t.classList.add("show"); setTimeout(()=>t.classList.remove("show"), 2000); }

    function buildRegionUI() {
        const regions = [{val:"all",label:"🌍 All"},{val:"africa",label:"🌍 Africa"},{val:"americas",label:"🌎 Americas"},{val:"europe",label:"🇪🇺 Europe"},{val:"middleeast",label:"🕌 Middle East"},{val:"asia",label:"🌏 Asia"},{val:"other",label:"🌐 Global"}];
        const container = document.getElementById("regionChips");
        container.innerHTML = regions.map(r => `<span class="chip ${activeRegion === r.val ? 'active' : ''}" data-region="${r.val}">${r.label}</span>`).join("");
        container.querySelectorAll(".chip").forEach(ch => ch.addEventListener("click", () => { activeRegion = ch.getAttribute("data-region"); buildRegionUI(); renderFeed(); }));
    }
    function buildCategoryUI() {
        const cats = ["all","economy","defence","geopolitics","technology","conflict","health"];
        const container = document.getElementById("categoryChips");
        container.innerHTML = cats.map(c => `<span class="chip ${activeCategory === c ? 'active' : ''}" data-cat="${c}">${c === 'all' ? 'All' : c}</span>`).join("");
        container.querySelectorAll(".chip").forEach(ch => ch.addEventListener("click", () => { activeCategory = ch.getAttribute("data-cat"); buildCategoryUI(); renderFeed(); }));
    }
    function buildSortUI() {
        const sorts = ["date","impact","positive","negative"];
        const container = document.getElementById("sortChips");
        container.innerHTML = sorts.map(s => `<span class="chip ${activeSort === s ? 'active' : ''}" data-sort="${s}">${s === 'date' ? 'Latest' : s === 'impact' ? 'Impact' : s === 'positive' ? 'Positive' : 'Negative'}</span>`).join("");
        container.querySelectorAll(".chip").forEach(ch => ch.addEventListener("click", () => { activeSort = ch.getAttribute("data-sort"); buildSortUI(); renderFeed(); }));
    }

    let popupShown = false;
    async function requestNotification(showMsg = true) {
        if (!("Notification" in window)) { if(showMsg) showToast("Push not supported"); return false; }
        if (Notification.permission === "granted") { if(showMsg) showToast("🔔 Already subscribed"); return true; }
        if (Notification.permission !== "denied") {
            const perm = await Notification.requestPermission();
            if (perm === "granted") { if(showMsg) showToast("✅ Subscribed! Breaking alerts enabled."); if (window._monetag?.push) window._monetag.push.subscribe(); return true; }
            else { if(showMsg) showToast("Notifications disabled"); return false; }
        } else { if(showMsg) showToast("Enable notifications in browser settings"); return false; }
    }
    function showSubscribePopup() {
        if (popupShown) return;
        if (Notification.permission === "granted") return;
        popupShown = true;
        const overlay = document.getElementById("subscribePopup");
        overlay.classList.add("show");
        document.getElementById("popupAllowBtn").onclick = async () => { overlay.classList.remove("show"); await requestNotification(true); };
    }

    document.querySelectorAll("[data-tab]").forEach(tab => {
        tab.addEventListener("click", () => {
            const target = tab.getAttribute("data-tab");
            document.querySelectorAll(".page").forEach(p => p.classList.remove("active-page"));
            document.getElementById(`${target}Page`).classList.add("active-page");
            document.querySelectorAll("[data-tab]").forEach(t => t.classList.remove("active"));
            tab.classList.add("active");
            if (target === "saved") renderSavedPage(); else renderFeed();
        });
    });
    document.getElementById("pushSubBtn")?.addEventListener("click", () => requestNotification(true));
    document.getElementById("refreshBtn")?.addEventListener("click", refreshAll);
    document.getElementById("searchInput")?.addEventListener("input", () => renderFeed());

    buildRegionUI(); buildCategoryUI(); buildSortUI();
    refreshAll().then(() => setTimeout(showSubscribePopup, 800));
    setInterval(refreshAll, 10 * 60 * 1000);
</script>
